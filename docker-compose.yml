services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: involute
      POSTGRES_PASSWORD: involute
      POSTGRES_USER: involute
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U involute -d involute"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server-init:
    build:
      context: .
      target: server
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
    command: >
      if [ "${PRISMA_ALLOW_DATA_LOSS:-false}" = "true" ]; then
        pnpm --filter @involute/server exec prisma db push --accept-data-loss --skip-generate;
      else
        pnpm --filter @involute/server exec prisma db push --skip-generate ||
        pnpm --filter @involute/server exec prisma migrate deploy;
      fi &&
      if [ "${SEED_DATABASE:-true}" = "true" ]; then
        pnpm --filter @involute/server exec prisma db seed;
      fi
    environment:
      DATABASE_URL: postgresql://involute:involute@db:5432/involute?schema=public
      PRISMA_ALLOW_DATA_LOSS: ${PRISMA_ALLOW_DATA_LOSS:-false}
      SEED_DATABASE: ${SEED_DATABASE:-true}
    restart: "no"

  server:
    build:
      context: .
      target: server
    depends_on:
      db:
        condition: service_healthy
      server-init:
        condition: service_completed_successfully
    environment:
      ALLOW_ADMIN_FALLBACK: ${ALLOW_ADMIN_FALLBACK:-false}
      DATABASE_URL: postgresql://involute:involute@db:5432/involute?schema=public
      AUTH_TOKEN: ${AUTH_TOKEN:-changeme-set-your-token}
      VIEWER_ASSERTION_SECRET: ${VIEWER_ASSERTION_SECRET:-compose-viewer-secret}
      PORT: 4200
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4200/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "4200:4200"

  web:
    build:
      context: .
      target: web-dev
    depends_on:
      server:
        condition: service_healthy
    environment:
      VITE_INVOLUTE_AUTH_TOKEN: ${AUTH_TOKEN:-changeme-set-your-token}
      VITE_INVOLUTE_GRAPHQL_URL: ${VITE_INVOLUTE_GRAPHQL_URL:-http://localhost:4200/graphql}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4201').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "4201:4201"

  cli:
    build:
      context: .
      target: cli
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-changeme-set-your-token}
      DATABASE_URL: postgresql://involute:involute@db:5432/involute?schema=public
      INVOLUTE_CONFIG_PATH: /tmp/involute-config.json
      VIEWER_ASSERTION_SECRET: ${VIEWER_ASSERTION_SECRET:-compose-viewer-secret}
    volumes:
      - ./.tmp:/exports

volumes:
  postgres-data:
