services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: involute
      POSTGRES_PASSWORD: involute
      POSTGRES_USER: involute
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U involute -d involute"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      target: server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://involute:involute@db:5432/involute?schema=public
      AUTH_TOKEN: ${AUTH_TOKEN:-changeme-set-your-token}
      PORT: 4200
      SEED_DATABASE: ${SEED_DATABASE:-true}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4200/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "4200:4200"

  web:
    build:
      context: .
      target: web
    depends_on:
      server:
        condition: service_healthy
    environment:
      VITE_INVOLUTE_AUTH_TOKEN: ${AUTH_TOKEN:-changeme-set-your-token}
      VITE_INVOLUTE_GRAPHQL_URL: ${VITE_INVOLUTE_GRAPHQL_URL:-http://localhost:4200/graphql}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4201').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "4201:4201"

  cli:
    build:
      context: .
      target: cli
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-changeme-set-your-token}
      DATABASE_URL: postgresql://involute:involute@db:5432/involute?schema=public
      INVOLUTE_CONFIG_PATH: /tmp/involute-config.json
    volumes:
      - ./.tmp:/exports

volumes:
  postgres-data:
