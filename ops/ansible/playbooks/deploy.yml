---
- name: Deploy Involute with Docker Compose
  hosts: all
  become: true
  vars:
    involute_default_deploy_path: /opt/involute
    involute_default_stack_profile: production
    involute_default_seed_database: false
    involute_compose_files: >-
      {{
        ['docker-compose.images.yml']
        if (involute_stack_profile | default(involute_default_stack_profile)) == 'tailscale'
        else ['docker-compose.prod.images.yml']
      }}
    involute_compose_services: >-
      {{
        ['db', 'server', 'web']
        if (
          (involute_stack_profile | default(involute_default_stack_profile)) == 'tailscale'
          or not (involute_enable_caddy | default(false) | bool)
        )
        else []
      }}
    involute_compose_file_args: "{{ involute_compose_files | map('regex_replace', '^', '-f ') | join(' ') }}"
    involute_compose_env_file_args: "--env-file {{ involute_env_target }}"
    involute_compose_profile_args: >-
      {{
        '--profile caddy'
        if (
          (involute_stack_profile | default(involute_default_stack_profile)) == 'production'
          and (involute_enable_caddy | default(false) | bool)
        )
        else ''
      }}
    involute_env_target: >-
      {{
        '.env'
        if (involute_stack_profile | default(involute_default_stack_profile)) == 'tailscale'
        else '.env.production'
      }}
    involute_env_template: >-
      {{
        'env.tailscale.j2'
        if (involute_stack_profile | default(involute_default_stack_profile)) == 'tailscale'
        else 'env.production.j2'
      }}
    involute_api_health_url: >-
      {{
        'http://' ~ (involute_bind_address | default('127.0.0.1')) ~ ':4200/health'
        if (involute_stack_profile | default(involute_default_stack_profile)) == 'tailscale'
        else 'http://' ~ (involute_server_bind_address | default(involute_bind_address | default('127.0.0.1'))) ~ ':4200/health'
      }}
    involute_web_health_url: >-
      {{
        'http://' ~ (involute_bind_address | default('127.0.0.1')) ~ ':4201/'
        if (involute_stack_profile | default(involute_default_stack_profile)) == 'tailscale'
        else 'http://' ~ (involute_web_bind_address | default(involute_bind_address | default('127.0.0.1'))) ~ ':4201/'
      }}
    involute_smoke_base_url: "{{ involute_app_origin }}"
    involute_rsync_excludes:
      - ".git"
      - "node_modules"
      - "dist"
      - ".env"
      - ".env.production"
      - "ops/ansible/inventory/hosts.yml"
      - ".tmp"
      - "playwright-report"
      - "test-results"
  tasks:
    - name: Validate required deployment variables
      ansible.builtin.assert:
        that:
          - (involute_stack_profile | default(involute_default_stack_profile)) in ['tailscale', 'production']
          - involute_auth_token is defined
          - involute_auth_token | length > 0
          - involute_viewer_assertion_secret is defined
          - involute_viewer_assertion_secret | length > 0
          - involute_app_origin is defined
          - involute_app_origin | length > 0
          - >-
            (
              (involute_stack_profile | default(involute_default_stack_profile)) != 'production'
            ) or (
              involute_postgres_password is defined
              and involute_postgres_password | length > 0
              and (involute_postgres_password is match('^[A-Za-z0-9._~-]+$'))
            )
          - >-
            (
              (involute_stack_profile | default(involute_default_stack_profile)) != 'production'
              or not (involute_require_google_oauth | default(true) | bool)
            ) or (
              involute_google_oauth_client_id is defined
              and involute_google_oauth_client_id | length > 0
              and involute_google_oauth_client_secret is defined
              and involute_google_oauth_client_secret | length > 0
              and involute_google_oauth_redirect_uri is defined
              and involute_google_oauth_redirect_uri | length > 0
            )
          - >-
            (
              (involute_stack_profile | default(involute_default_stack_profile)) != 'tailscale'
            ) or (
              involute_bind_address is defined and involute_bind_address | length > 0
            )
          - >-
            (
              (involute_stack_profile | default(involute_default_stack_profile)) != 'tailscale'
            ) or (
              (involute_admin_email_allowlist | default('') | trim | length > 0)
              or (involute_seed_default_admin | default(false) | bool)
              or (involute_allow_admin_fallback | default(false) | bool)
            )
        fail_msg: >-
          Missing or invalid deploy variables. Production requires a URL-safe
          involute_postgres_password matching ^[A-Za-z0-9._~-]+$ because it is
          used in DATABASE_URL. Production also requires Google OAuth client ID,
          client secret, and redirect URI when involute_require_google_oauth is
          true. Tailscale deployments require involute_bind_address and either
          an admin allowlist, seeded default admin, or admin fallback.

    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"
        state: directory
        mode: "0755"

    - name: Synchronize repository to target
      ansible.builtin.shell: >
        rsync -az --delete
        {{ involute_rsync_excludes | map('regex_replace', '^(.*)$', '--exclude=\\1') | join(' ') }}
        {{ (playbook_dir ~ '/../../../') | quote }}
        {{
          (
            (ansible_user | default('root')) ~ '@' ~
            (ansible_host | default(inventory_hostname)) ~ ':' ~
            (involute_deploy_path | default(involute_default_deploy_path)) ~ '/'
          ) | quote
        }}
      delegate_to: localhost
      become: false

    - name: Render stack environment file
      ansible.builtin.template:
        src: "../templates/{{ involute_env_template }}"
        dest: "{{ involute_deploy_path | default(involute_default_deploy_path) }}/{{ involute_env_target }}"
        mode: "0600"

    - name: Check for legacy source-build compose file
      ansible.builtin.stat:
        path: "{{ involute_deploy_path | default(involute_default_deploy_path) }}/docker-compose.yml"
      register: involute_legacy_compose

    - name: Check for legacy production source-build compose file
      ansible.builtin.stat:
        path: "{{ involute_deploy_path | default(involute_default_deploy_path) }}/docker-compose.prod.yml"
      register: involute_legacy_prod_compose

    - name: Stop legacy source-build stack if present
      ansible.builtin.shell: >
        docker compose
        --env-file .env
        -f docker-compose.yml
        down --remove-orphans
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"
      when: involute_legacy_compose.stat.exists

    - name: Stop legacy production source-build stack if present
      ansible.builtin.shell: >
        docker compose
        --env-file .env.production
        -f docker-compose.prod.yml
        down --remove-orphans
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"
      when: involute_legacy_prod_compose.stat.exists

    - name: Stop existing standardized stack
      ansible.builtin.shell: >
        docker compose
        {{ involute_compose_env_file_args }}
        {{ involute_compose_profile_args }}
        {{ involute_compose_file_args }}
        down --remove-orphans
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"

    - name: Wait for previous ports to be released
      ansible.builtin.shell: >
        for port in 5434 4200 4201; do
          for attempt in $(seq 1 30); do
            if ! ss -ltn | grep -q ":${port} "; then
              break;
            fi;
            sleep 1;
            if [ "${attempt}" -eq 30 ]; then
              exit 1;
            fi;
          done;
        done
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"

    - name: Start stack
      ansible.builtin.shell: >
        docker compose
        {{ involute_compose_env_file_args }}
        {{ involute_compose_profile_args }}
        {{ involute_compose_file_args }}
        up -d
        {{ involute_compose_services | join(' ') }}
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"

    - name: Wait for API health check
      ansible.builtin.shell: >
        for attempt in $(seq 1 60); do
          curl --connect-timeout 2 --max-time 5 -sf {{ involute_api_health_url | quote }} && exit 0;
          sleep 2;
        done;
        exit 1
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"

    - name: Wait for web health check
      ansible.builtin.shell: >
        for attempt in $(seq 1 60); do
          curl --connect-timeout 2 --max-time 5 -sfI {{ involute_web_health_url | quote }} >/dev/null && exit 0;
          sleep 2;
        done;
        exit 1
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"

    - name: Verify auth session reports Google OAuth configured
      ansible.builtin.uri:
        url: "{{ involute_smoke_base_url }}/auth/session"
        method: GET
        return_content: true
        status_code:
          - 200
          - 401
      register: involute_auth_session_smoke
      failed_when: not (involute_auth_session_smoke.json.googleOAuthConfigured | default(false) | bool)

    - name: Verify Google OAuth start redirects to Google
      ansible.builtin.uri:
        url: "{{ involute_smoke_base_url }}/auth/google/start"
        method: GET
        follow_redirects: none
        status_code: 302
      register: involute_google_start_smoke
      failed_when: "'accounts.google.com' not in (involute_google_start_smoke.location | default(''))"

    - name: Show compose status
      ansible.builtin.shell: >
        docker compose
        {{ involute_compose_env_file_args }}
        {{ involute_compose_profile_args }}
        {{ involute_compose_file_args }}
        ps
      args:
        chdir: "{{ involute_deploy_path | default(involute_default_deploy_path) }}"
      register: involute_compose_ps
      changed_when: false

    - name: Print compose status
      ansible.builtin.debug:
        var: involute_compose_ps.stdout_lines
