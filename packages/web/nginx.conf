server {
  listen 4201;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /graphql {
    proxy_pass ${INTERNAL_SERVER_ORIGIN}/graphql;
    proxy_http_version 1.1;
    proxy_set_header Authorization "${WEB_PROXY_AUTHORIZATION}";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/ {
    proxy_pass ${INTERNAL_SERVER_ORIGIN};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass ${INTERNAL_SERVER_ORIGIN}/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
